name: CI — Android

on:
  push:
    branches: [main, 'claude/**', 'feature/**', 'fix/**']
  pull_request:
    paths:
      - 'web/android/**'
      - 'web/capacitor.config.json'
      - 'web/src/**'
      - 'supabase/**'

concurrency:
  group: ci-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Build web app
        run: npm run build
        working-directory: web
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 1

  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
      - name: Install web dependencies
        run: npm ci
        working-directory: web
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/
      - name: Sync Capacitor assets
        run: npx cap sync android
        working-directory: web
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
        working-directory: web/android
      - uses: actions/upload-artifact@v4
        with:
          name: erg-dashboard-debug
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
