name: 🐛 Bug
description: Something is broken or behaving incorrectly
labels: ['P1', 'bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: What's wrong
      description: One or two sentences on the broken behaviour.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected
      description: What should have happened?
    validations:
      required: true
  - type: input
    id: actual
    attributes:
      label: Actual
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment / context
      description: Web or Android APK? Console errors? Affected view (Coach, ErgLive, mobile tab)?
    validations:
      required: false
